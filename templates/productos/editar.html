{% extends "base.html" %}
{% block content %}
<div class="card shadow p-4 col-md-6 mx-auto mt-5">
    <h3 class="text-center" style="color: #003366;">Actualizar Producto</h3>
    <form action="/editar/{{ producto.id }}" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Categoría</label>
            <select name="id_categoria" class="form-control" required>
                {% for c in categorias %}
                <option value="{{ c.id_categoria }}" {% if c.id_categoria == producto.id_categoria %}selected{% endif %}>
                    {{ c.nombre_categoria }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Precio ($)</label>
            <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
        </div>
        <div class="d-flex justify-content-between mt-4">
            <a href="/" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary fw-bold">Guardar Cambios</button>
        </div>
    </form>
</div>
{% endblock %}
