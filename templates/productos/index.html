{% extends "base.html" %}
{% block content %}
<div class="card shadow p-4 border-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #003366; font-weight: bold;">📦 Sistema Patrick Luna (Evaluación Final)</h2>
        <a href="/reporte_pdf" class="btn btn-warning fw-bold">📄 Generar PDF</a>
    </div>

    <form action="/agregar" method="POST" class="row g-3 mb-4 p-3 bg-light rounded shadow-sm">
        <div class="col-md-3">
            <label class="form-label fw-bold">Descripción</label>
            <input type="text" name="nombre" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label fw-bold">Categoría</label>
            <select name="id_categoria" class="form-control" required>
                {% for c in categorias %}
                <option value="{{ c.id_categoria }}">{{ c.nombre_categoria }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold">Stock</label>
            <input type="number" name="stock" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold">Precio ($)</label>
            <input type="number" step="0.01" name="precio" class="form-control" required>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-success w-100 fw-bold">Guardar</button>
        </div>
    </form>

    <table class="table table-hover align-middle">
        <thead style="background-color: #003366; color: white;">
            <tr>
                <th>ID</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Precio</th><th class="text-center">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nombre }}</td>
                <td><span class="badge bg-secondary">{{ p.nombre_categoria }}</span></td>
                <td>{{ p.stock }}</td>
                <td>${{ p.precio }}</td>
                <td class="text-center">
                    <a href="/editar/{{ p.id }}" class="btn btn-sm btn-info text-white">Editar</a>
                    <a href="/eliminar/{{ p.id }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Borrar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
