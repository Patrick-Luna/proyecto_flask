<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto Flask - Semana 12</title>
    <style>
        .btn-persistencia {
            background-color: #27ae60;
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
        }
        .btn-persistencia:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>
    <nav style="padding: 10px; background-color: #f8f9fa;">
        <a href="{{ url_for('index') }}" style="text-decoration: none; color: #2c3e50; font-weight: bold;">Inicio</a> | 
        
        <a href="{{ url_for('ver_datos') }}" class="btn-persistencia">
            📂 Ver Persistencia (TXT/JSON/CSV)
        </a>
    </nav>
    <hr>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer style="margin-top: 50px; font-size: 0.8em; color: gray; text-align: center;">
        <hr>
        <p>Proyecto Inventario - Patrick Luna - 2026</p>
    </footer>
</body>
</html>
