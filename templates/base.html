<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Importadora Patrick Luna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #2c3e50 !important; }
        .card-header { background-color: #2980b9 !important; color: white; font-weight: bold; }
        .btn-primary { background-color: #2980b9; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📦 Sistema Patrick Luna</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white me-3">Bienvenido, {{ usuario }}</span>
                <a class="btn btn-danger btn-sm" href="/logout">Cerrar Sesión</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
